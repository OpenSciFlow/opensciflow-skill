name: Validate OpenSciFlow Skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install jsonschema pyyaml pytest
      - name: Validate fixtures
        run: |
          python scripts/validate_skill_input.py tests/fixtures/valid_skill_input.json
          python scripts/validate_skill_output.py examples/gromacs-rmsd/skill-output.example.json
          python scripts/validate_execution_request.py examples/gromacs-rmsd/execution-request.json
          python scripts/validate_execution_request.py examples/slurm-gromacs-rmsd/execution-request.json
          python scripts/validate_execution_request.py examples/slurm-mace-evaluation/execution-request.json
          python scripts/validate_run_record.py tests/fixtures/valid_run_record.json
          python scripts/validate_run_record.py examples/slurm-gromacs-rmsd/run-record.example.json
          python scripts/validate_run_record.py examples/slurm-mace-evaluation/run-record.example.json
          python scripts/validate_run_record.py examples/biopilot-md-stability/skill-run-record.projection.json
          python scripts/validate_slurm_workflow_alignment.py
          python scripts/validate_run_record_crosswalk.py
      - name: Run tests
        run: python -m pytest
