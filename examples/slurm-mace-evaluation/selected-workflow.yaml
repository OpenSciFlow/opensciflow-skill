schema_version: "opensciflow.workflow/v0.1"
workflow_name: "mace-evaluation-slurm"
domain: ["materials-science", "atomistic-simulation", "hpc"]
task_description: "Prepare a reviewed Slurm wrapper for MACE model evaluation on atomic configurations."
inputs:
  - { name: "configs_xyz", type: "file", formats: ["xyz", "extxyz"], required: true }
  - { name: "model_file", type: "file", formats: ["model", "pt"], required: true }
outputs:
  - { name: "evaluated_configs", type: "file", formats: ["xyz", "extxyz"], required: true }
  - { name: "execution_log", type: "file", formats: ["log", "txt"], required: true }
  - { name: "run_record", type: "file", formats: ["json"], required: true }
steps:
  - id: "check_inputs"
    description: "Confirm configs, model file, license, citation, and checksum metadata."
    consumes: ["configs_xyz", "model_file"]
    produces: ["validated_inputs"]
  - id: "render_slurm_wrapper"
    description: "Render a reviewed Slurm wrapper into the approved run directory."
    depends_on: ["check_inputs"]
    consumes: ["validated_inputs"]
    produces: ["slurm_job_script"]
  - id: "request_submission_approval"
    description: "Show GPU/resource request, wrapper, model metadata, citations, and limitations."
    depends_on: ["render_slurm_wrapper"]
    consumes: ["slurm_job_script"]
    produces: ["approval_decision"]
  - id: "submit_job"
    description: "Submit the job only after explicit approval."
    depends_on: ["request_submission_approval"]
    consumes: ["approval_decision"]
    produces: ["slurm_job_id"]
  - id: "write_record"
    description: "Write planned or submitted run record."
    depends_on: ["submit_job"]
    consumes: ["slurm_job_id"]
    produces: ["run_record"]
dag:
  check_inputs: []
  render_slurm_wrapper: ["check_inputs"]
  request_submission_approval: ["render_slurm_wrapper"]
  submit_job: ["request_submission_approval"]
  write_record: ["submit_job"]
plugins:
  required: ["mace-interatomic-potential"]
  optional: []
limitations:
  - "MACE predictions depend on the selected model, training domain, element coverage, and device precision."
  - "Energies and forces are computational predictions, not universal ground truth."

